      font-family: -apple-system, 'Helvetica Neue', sans-serif;

      height: 100dvh;
      width: 100vw;
    }

    /* ── Feed container ── */
    #feed {
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    /* ── Each card ── */
    .card {
      position: relative;
      height: 100dvh;
      width: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    /* gradient backgrounds per card */
    .card:nth-child(1)  { background: linear-gradient(160deg, #0d0d0d 0%, #1a0533 100%); }
    .card:nth-child(2)  { background: linear-gradient(160deg, #001a33 0%, #003366 100%); }
    .card:nth-child(3)  { background: linear-gradient(160deg, #0d1a00 0%, #1a3300 100%); }
    .card:nth-child(4)  { background: linear-gradient(160deg, #1a0000 0%, #330000 100%); }
    .card:nth-child(5)  { background: linear-gradient(160deg, #1a1400 0%, #332800 100%); }
    .card:nth-child(6)  { background: linear-gradient(160deg, #00101a 0%, #001f33 100%); }
    .card:nth-child(7)  { background: linear-gradient(160deg, #0d001a 0%, #1f0033 100%); }
    .card:nth-child(8)  { background: linear-gradient(160deg, #001a0d 0%, #003320 100%); }
    .card:nth-child(9)  { background: linear-gradient(160deg, #1a0d00 0%, #331a00 100%); }
    .card:nth-child(10) { background: linear-gradient(160deg, #0d0d1a 0%, #1a1a33 100%); }

    /* animated blob */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 8s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -30px) scale(1.15); }
    }

    /* ── Video panel — full card ── */
    .video-panel {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #000;
    }
    .video-panel video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* gradient scrim so bottom text is readable */
    .video-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        transparent 30%,
        transparent 45%,
        rgba(0,0,0,0.55) 70%,
        rgba(0,0,0,0.82) 100%
      );
      pointer-events: none;
    }

    /* ── Bottom-left content ── */
    .content {
      position: relative;
      z-index: 10;
      padding: 0 80px 80px 16px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .headline {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .headline .accent {
      background: linear-gradient(90deg, #fe2c55, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .body-text {
      font-size: clamp(13px, 3vw, 15px);
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .pill {
      font-size: 12px;
      color: #ff8fa3;
      font-weight: 600;
    }
    .pill::before { content: '· '; opacity: 0.5; }
    .pill.blue  { color: #6ec4ff; }
    .pill.green { color: #6ee8a8; }
    .pill.yellow { color: #ffe066; }

    .stat-row {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 26px; font-weight: 800; color: #fe2c55; line-height: 1; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .username {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .music-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 8px;
    }
    .music-note { animation: spin 3s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Right-side action buttons ── */
    .actions {
      position: absolute;
      z-index: 10;
      right: 12px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    .action-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.15s, background 0.15s;
    }
    .action-btn:active .action-icon {
      transform: scale(1.2);
      background: rgba(255,255,255,0.25);
    }
    .action-label {
      font-size: 10px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: linear-gradient(135deg, #fe2c55, #25f4ee);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: -4px;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;

      pointer-events: none;
    }
    .topbar-live {
      background: #fe2c55;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      pointer-events: all;
    }
    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }
    .topbar-search {
      font-size: 20px;
      pointer-events: all;
      cursor: pointer;
    }

      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 60px;

      justify-content: space-around;

      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.2s;
      min-width: 48px;

      color: #fff;
      font-weight: 300;

      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 5px;

      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
    }
    .dot.active {
      height: 14px;
      border-radius: 3px;
      background: #fff;
    }

      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;

      color: rgba(255,255,255,0.7);

    }
    .hint-text { font-size: 11px; color: rgba(255,255,255,0.6); }

    .card-entering .content,

    }
    @keyframes slidein {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.7);

    }

      height: 8px;

      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;

      margin-top: 10px;
      font-size: 14px;

    /* grid */

    .grid-cell { padding: 4px 0; }

    .grid-cell .label { font-size: 11px; color: rgba(255,255,255,0.5); }
    .grid-cell .value { font-size: 13px; font-weight: 700; color: #fff; }
  </style>
</head>

    blob1: { w:280, h:280, top:"55%", left:"-50px", color:"#7a3800" },
    blob2: { w:200, h:200, bottom:"8%", right:"-70px", color:"#ff6600" },
  },
  {
    tag: "Start Your Journey",
    headline: `You're <span class="accent">already</span> a media expert`,
    body: "Every scroll, every stream, every swipe — you've been decoding media your whole life. This course just gives you the language for it.",
    extra: `
      <div class="info-box">
        <p>📅 2-year course &nbsp;·&nbsp; IGCSE Level</p>
        <p>🌍 Recognised globally by universities and employers</p>
        <p>🎓 Grade A*–G &nbsp;·&nbsp; Qualification code: <strong>9607</strong></p>
      </div>
      <div class="pill-list" style="margin-top:10px">
        <span class="pill green">Critical thinking</span>
        <span class="pill blue">Creative production</span>
        <span class="pill yellow">Communication</span>
      </div>`,
    username: "@cambridge.media",
    music: "Media Studies — Your Story Starts Now",
    likes: "31.2K", comments: "2.4K", bookmarks: "8.1K",
    videoSrc: "videos/10.m4v",
    bg: "#1a1a33",
    blob1: { w:300, h:300, top:"55%", right:"-60px", color:"#1a1a66" },
    blob2: { w:220, h:220, bottom:"12%", left:"-80px", color:"#3333cc" },
  },
];

// ── Build feed ─────────────────────────────────────────────────────────────
const feed = document.getElementById('feed');
const progress = document.getElementById('progress');

cards.forEach((c, i) => {
  // dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  progress.appendChild(dot);

  // card
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = i;
  card.style.setProperty('--card-bg', c.bg);

  // video panel
  const videoPanel = document.createElement('div');
  videoPanel.className = 'video-panel';
  const vid = document.createElement('video');
  vid.src = c.videoSrc;
  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;
  vid.preload = 'metadata';
  videoPanel.appendChild(vid);

  // blobs
  const blob1 = document.createElement('div');
  blob1.className = 'blob';
  Object.assign(blob1.style, {
    width: c.blob1.w+'px', height: c.blob1.h+'px',
    top: c.blob1.top || 'auto', left: c.blob1.left || 'auto',
    right: c.blob1.right || 'auto', bottom: c.blob1.bottom || 'auto',
    background: c.blob1.color,
    animationDuration: (6 + i % 4) + 's',
  });
  const blob2 = document.createElement('div');
  blob2.className = 'blob';
  Object.assign(blob2.style, {
    width: c.blob2.w+'px', height: c.blob2.h+'px',
    top: c.blob2.top || 'auto', left: c.blob2.left || 'auto',
    right: c.blob2.right || 'auto', bottom: c.blob2.bottom || 'auto',
    background: c.blob2.color,
    animationDuration: (5 + i % 3) + 's',
    animationDirection: 'alternate-reverse',
  });

  // content
  const content = document.createElement('div');
  content.className = 'content';
  content.innerHTML = `
    <div class="tag">${c.tag}</div>
    <div class="headline">${c.headline}</div>
    <div class="body-text">${c.body}</div>
    ${c.extra || ''}
    <div class="username">${c.username}</div>
    <div class="music-line"><span class="music-note">♫</span>${c.music}</div>
  `;

  // actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = `
    <div class="action-btn">
      <div class="avatar">📚</div>
    </div>
    <div class="action-btn" onclick="this.querySelector('.action-icon').style.color='#fe2c55'">
      <div class="action-icon">❤️</div>
      <div class="action-label">${c.likes}</div>
    </div>
    <div class="action-btn">
      <div class="action-icon">💬</div>
      <div class="action-label">${c.comments}</div>
    </div>
    <div class="action-btn">
      <div class="action-icon">🔖</div>
      <div class="action-label">${c.bookmarks}</div>
    </div>
    <div class="action-btn">
      <div class="action-icon">↗️</div>
      <div class="action-label">Share</div>
    </div>
  `;

  card.appendChild(videoPanel);
  card.appendChild(blob1);
  card.appendChild(blob2);
  card.appendChild(content);
  card.appendChild(actions);
  feed.appendChild(card);
});

// ── Intersection observer for active dot & entrance animation ──────────────
const dots = [...document.querySelectorAll('.dot')];
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const video = e.target.querySelector('video');
    if (e.isIntersecting) {
      const i = +e.target.dataset.index;
      dots.forEach((d, j) => d.classList.toggle('active', j === i));
      e.target.classList.add('card-entering');
      setTimeout(() => e.target.classList.remove('card-entering'), 600);
      if (video) video.play().catch(() => {});
    } else {
      if (video) { video.pause(); video.currentTime = 0; }
    }
  });
}, { threshold: 0.6 });

document.querySelectorAll('.card').forEach(c => observer.observe(c));

// ── Touch / mouse swipe support (for non-scroll-snap browsers) ─────────────
let startY = 0;
feed.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
feed.addEventListener('touchend', e => {
  const dy = startY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) {
    const dir = dy > 0 ? 1 : -1;
    const h = window.innerHeight;
    feed.scrollBy({ top: dir * h, behavior: 'smooth' });
  }
}, { passive: true });

// keyboard nav
document.addEventListener('keydown', e => {
  const h = window.innerHeight;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    feed.scrollBy({ top: e.key === 'ArrowDown' ? h : -h, behavior: 'smooth' });
  }
});
</script>
</body>
</html>
